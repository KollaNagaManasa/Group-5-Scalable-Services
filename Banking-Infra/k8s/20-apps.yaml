apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels: { app: customer-service }
  template:
    metadata:
      labels: { app: customer-service }
    spec:
      containers:
        - name: app
          image: customer-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8081 }]
          env:
            - { name: SERVER_PORT, value: "8081" }
            - { name: DB_URL, value: "jdbc:postgresql://customer-db:5432/customer_db" }
            - { name: DB_USER, value: "customer" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-secrets, key: customer-db-password } }
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: banking
spec:
  selector: { app: customer-service }
  ports: [{ port: 8081, targetPort: 8081, nodePort: 30081 }]
  type: NodePort
---
