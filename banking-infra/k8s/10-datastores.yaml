---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-db
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels: { app: customer-db }
  template:
    metadata:
      labels: { app: customer-db }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: customer_db }
            - { name: POSTGRES_USER, value: customer }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: db-secrets, key: customer-db-password } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "500m" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: customer-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: customer-db
  namespace: banking
spec:
  ports: [{ port: 5432, targetPort: 5432 }]
  selector: { app: customer-db }
---
