apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - { containerPort: 5672 }
            - { containerPort: 15672 }
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "768Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: banking
spec:
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: mgmt, port: 15672, targetPort: 15672 }
  selector: { app: rabbitmq }
