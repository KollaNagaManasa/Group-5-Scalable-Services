server:
  port: ${SERVER_PORT:8081}
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/customer_db}
    username: ${DB_USER:customer}
    password: ${DB_PASSWORD:customer}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
