spring.application.name=customer-service
server.port=9090

# Database Configuration (Defaults for local run, overridden by Docker Compose)
spring.datasource.url=jdbc:mysql://localhost:3306/customer-service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Naseeruddin@786
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:29092

# Logging Configuration
logging.file.name=logs/customer-service.log
logging.file.path=logs
logging.level.com.customer=DEBUG
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Multipart settings to allow large file uploads if needed
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
